<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1.0" name="viewport" />
    <title>Page Not Found — UniConnect</title>

    <link href="404.css" rel="stylesheet" />
</head>

<body>
    <!-- Floating emoji -->
    <div class="div-floating">🎓</div>
    <div class="fade-in">
        <!-- 404 number -->
        <div class="div-404">404</div>
        <h1 class="heading-not-found">Page not found</h1>
        <p class="paragraph-not-found">Looks like this page doesn't exist, was moved, or you typed something wrong in the URL.</p>
        <div class="div-actions">
            <a href="dashboard.html"><button class="btn btn-primary btn-lg">🏠 Go to Home Feed</button></a>
            <button class="btn btn-ghost btn-lg" onclick="history.back()">← Go Back</button>
        </div>
        <!-- Quick links -->
        <div class="div-quick-links">
            <div class="div-looking-for">Maybe you were looking for...</div>
            <div class="div-links">
                <a href="dashboard.html">
                    <div class="div-indigo-links" onmouseout="this.style.background='var(--indigo-light)'"
                        onmouseover="this.style.background='#dde6ff'">🏠 Home Feed</div>
                </a>
                <a href="create-post.html">
                    <div class="div-indigo-links" onmouseout="this.style.background='var(--indigo-light)'"
                        onmouseover="this.style.background='#dde6ff'">✏️ Ask a Question</div>
                </a>
                <a href="leaderboard.html">
                    <div class="div-indigo-links" onmouseout="this.style.background='var(--indigo-light)'"
                        onmouseover="this.style.background='#dde6ff'">🏆 Leaderboard</div>
                </a>
                <a href="sessions.html">
                    <div class="div-indigo-links" onmouseout="this.style.background='var(--indigo-light)'"
                        onmouseover="this.style.background='#dde6ff'">💬 Sessions</div>
                </a>
                <a href="points.html">
                    <div class="div-rewards">🪙 Rewards</div>
                </a>
                <a href="profile.html">
                    <div class="div-indigo-links" onmouseout="this.style.background='var(--indigo-light)'"
                        onmouseover="this.style.background='#dde6ff'">👤 My Profile</div>
                </a>
            </div>
        </div>
        <!-- Logo at bottom -->
        <div class="div-bottom">
            <div class="div-bottom-logo">🎓</div>
            <span class="span-uniconnect">UniConnect</span>
        </div>
    </div>
</body>

</html>
