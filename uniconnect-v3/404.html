<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Page Not Found — UniConnect</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
:root{--indigo:#3D52A0;--indigo-light:#EEF2FF;--violet:#7091E6;--amber:#F59E0B;--border:#E2E8F0;--text:#0F172A;--text-2:#475569;--text-3:#94A3B8}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(145deg,#EEF2FF 0%,#F4F6FF 55%,#EDE9FE 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;text-align:center;padding:30px 20px}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border-radius:11px;font-weight:700;font-size:14px;transition:all .2s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#3D52A0,#5B73C7);color:#fff;box-shadow:0 4px 16px rgba(61,82,160,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(61,82,160,.4)}
.btn-ghost{background:transparent;color:#475569;border:1.5px solid #E2E8F0}
.btn-ghost:hover{background:#EEF2FF;color:#3D52A0;border-color:#3D52A0}
.btn-lg{padding:14px 30px;font-size:15px}
/* Animated 404 */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease both}
</style>
</head>
<body>

<!-- Floating emoji -->
<div style="font-size:80px;animation:float 3s ease-in-out infinite;margin-bottom:10px">🎓</div>

<div class="fade-in" style="animation-delay:.1s;max-width:520px">
  <!-- 404 number -->
  <div style="font-size:clamp(80px,15vw,140px);font-weight:900;line-height:1;letter-spacing:-4px;background:linear-gradient(135deg,#3D52A0,#7091E6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px">404</div>

  <h1 style="font-size:clamp(22px,4vw,30px);font-weight:900;margin-bottom:12px;letter-spacing:-.4px">Page not found</h1>
  <p style="font-size:16px;color:#475569;line-height:1.7;margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto">Looks like this page doesn't exist, was moved, or you typed something wrong in the URL.</p>

  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:40px">
    <a href="dashboard.html"><button class="btn btn-primary btn-lg">🏠 Go to Home Feed</button></a>
    <button class="btn btn-ghost btn-lg" onclick="history.back()">← Go Back</button>
  </div>

  <!-- Quick links -->
  <div style="background:rgba(255,255,255,.7);border:1px solid #E2E8F0;border-radius:16px;padding:20px 24px;backdrop-filter:blur(10px)">
    <div style="font-size:13px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px">Maybe you were looking for...</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
      <a href="dashboard.html"><div style="background:var(--indigo-light);color:var(--indigo);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s" onmouseover="this.style.background='#dde6ff'" onmouseout="this.style.background='var(--indigo-light)'">🏠 Home Feed</div></a>
      <a href="create-post.html"><div style="background:var(--indigo-light);color:var(--indigo);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s" onmouseover="this.style.background='#dde6ff'" onmouseout="this.style.background='var(--indigo-light)'">✏️ Ask a Question</div></a>
      <a href="leaderboard.html"><div style="background:var(--indigo-light);color:var(--indigo);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s" onmouseover="this.style.background='#dde6ff'" onmouseout="this.style.background='var(--indigo-light)'">🏆 Leaderboard</div></a>
      <a href="sessions.html"><div style="background:var(--indigo-light);color:var(--indigo);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s" onmouseover="this.style.background='#dde6ff'" onmouseout="this.style.background='var(--indigo-light)'">💬 Sessions</div></a>
      <a href="points.html"><div style="background:#FEF3C7;color:#92400E;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s">🪙 Rewards</div></a>
      <a href="profile.html"><div style="background:var(--indigo-light);color:var(--indigo);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s" onmouseover="this.style.background='#dde6ff'" onmouseout="this.style.background='var(--indigo-light)'">👤 My Profile</div></a>
    </div>
  </div>

  <!-- Logo at bottom -->
  <div style="margin-top:36px;display:flex;align-items:center;justify-content:center;gap:9px;color:#94A3B8">
    <div style="width:28px;height:28px;background:linear-gradient(135deg,#3D52A0,#7091E6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px">🎓</div>
    <span style="font-weight:900;font-size:16px;color:#64748B">UniConnect</span>
  </div>
</div>

</body>
</html>
