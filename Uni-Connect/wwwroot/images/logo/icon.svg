<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img">
  <title>UniConnect</title>
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#3D52A0"/>
  <!-- Knowledge Bridge: learner block (bold, top-left) -->
  <rect x="10" y="16" width="20" height="20" rx="6" fill="white" fill-opacity="0.9"/>
  <!-- Helper block (lighter, bottom-right) -->
  <rect x="34" y="28" width="20" height="20" rx="6" fill="white" fill-opacity="0.5"/>
  <!-- Golden arc — the bridge of knowledge between them -->
  <path d="M26 26 Q 32 18, 38 28" stroke="#FFB627" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Spark at the bridge midpoint — the moment of understanding -->
  <circle cx="32" cy="22" r="3" fill="#FFB627"/>
</svg>
