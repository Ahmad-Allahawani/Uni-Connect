<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="UniConnect">
  <title>UniConnect</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A63BE"/>
      <stop offset="100%" stop-color="#2d3f7a"/>
    </linearGradient>
    <linearGradient id="pageLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E8EEFF" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background with gradient -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  <!-- Left page — dominant / learner -->
  <path d="M32 12 C 27 12, 13 15.5, 10 21 L 10 51 C 13 46.5, 27 43, 32 43 L 32 12 Z" fill="url(#pageLeft)"/>
  <!-- Right page — helper (softer) -->
  <path d="M32 12 C 37 12, 51 15.5, 54 21 L 54 51 C 51 46.5, 37 43, 32 43 L 32 12 Z" fill="#ffffff" opacity="0.35"/>
  <!-- Spine -->
  <rect x="30.8" y="11" width="2.4" height="33" rx="1.2" fill="#0F172A" opacity="0.14"/>
  <!-- Book base arc -->
  <path d="M 10 51 Q 32 56.5 54 51" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-opacity="0.16" stroke-linecap="round"/>
  <!-- Amber student node (left) -->
  <circle cx="18" cy="58" r="5.2" fill="#F59E0B"/>
  <!-- Violet student node (right) -->
  <circle cx="46" cy="58" r="5.2" fill="#93B4FF"/>
  <!-- Knowledge lines -->
  <line x1="18" y1="52.8" x2="31.2" y2="43.6" stroke="#F59E0B" stroke-width="2.1" stroke-linecap="round" stroke-opacity="0.95"/>
  <line x1="46" y1="52.8" x2="32.8" y2="43.6" stroke="#93B4FF" stroke-width="2.1" stroke-linecap="round" stroke-opacity="0.95"/>
</svg>
