<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" width="300" height="64" role="img">
  <title>UniConnect — Peer Learning Platform</title>
  <!-- Icon background -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#3D52A0"/>
  <!-- Learner block -->
  <rect x="10" y="16" width="20" height="20" rx="6" fill="white" fill-opacity="0.9"/>
  <!-- Helper block -->
  <rect x="34" y="28" width="20" height="20" rx="6" fill="white" fill-opacity="0.5"/>
  <!-- Golden arc bridge -->
  <path d="M26 26 Q 32 18, 38 28" stroke="#FFB627" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Spark -->
  <circle cx="32" cy="22" r="3" fill="#FFB627"/>
  <!-- Wordmark -->
  <text x="78" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#3D52A0" letter-spacing="-0.5">Uni</text>
  <text x="116" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#7091E6" letter-spacing="-0.5">Connect</text>
  <!-- Tagline -->
  <text x="79" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#94A3B8" letter-spacing="0.1em">PEER LEARNING PLATFORM</text>
</svg>
