<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img">
  <title>UniConnect — Peer Learning Platform</title>
  <desc>Full color logo lockup: open book icon on indigo background with UniConnect wordmark and tagline.</desc>

  <!-- Icon background -->
  <rect x="0" y="6" width="60" height="60" rx="16" fill="#3D52A0"/>

  <!-- Left page -->
  <path d="M30 16 C 26 16, 16 18, 13 22 L 13 49 C 16 46, 26 44, 30 44 L 30 16 Z"
        fill="#ffffff" opacity="1"/>

  <!-- Right page -->
  <path d="M30 16 C 34 16, 44 18, 47 22 L 47 49 C 44 46, 34 44, 30 44 L 30 16 Z"
        fill="#ffffff" opacity="0.4"/>

  <!-- Spine -->
  <rect x="29" y="15" width="2" height="30" rx="1" fill="#0F172A" opacity="0.18"/>

  <!-- Base arc -->
  <path d="M 13 49 Q 30 53 47 49" stroke="#ffffff" stroke-width="1.5"
        fill="none" stroke-opacity="0.12" stroke-linecap="round"/>

  <!-- Student nodes -->
  <circle cx="19" cy="57" r="4.5" fill="#F59E0B"/>
  <circle cx="41" cy="57" r="4.5" fill="#93B4FF"/>

  <!-- Rising lines -->
  <line x1="19" y1="52.5" x2="29.5" y2="44.5" stroke="#F59E0B" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="41" y1="52.5" x2="30.5" y2="44.5" stroke="#93B4FF" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="76" y="33"
        font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="800" fill="#3D52A0" letter-spacing="-0.5">Uni</text>
  <text x="122" y="33"
        font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="800" fill="#7091E6" letter-spacing="-0.5">Connect</text>

  <!-- Tagline -->
  <text x="77" y="53"
        font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="0.09em">PEER LEARNING PLATFORM</text>
</svg>
