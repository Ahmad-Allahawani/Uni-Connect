<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img">
  <title>UniConnect</title>
  <desc>Open book peer learning platform icon — indigo left page, violet right page, amber and blue student nodes connected by rising lines.</desc>

  <!-- App icon background -->
  <rect width="64" height="64" rx="18" fill="#3D52A0"/>

  <!-- Left page — the learner (full white, dominant) -->
  <path d="M32 13 C 27 13, 14 16, 11 21 L 11 50 C 14 46, 27 43, 32 43 L 32 13 Z"
        fill="#ffffff" opacity="1"/>

  <!-- Right page — the helper (lighter, recessive) -->
  <path d="M32 13 C 37 13, 50 16, 53 21 L 53 50 C 50 46, 37 43, 32 43 L 32 13 Z"
        fill="#ffffff" opacity="0.4"/>

  <!-- Spine — the platform holding both together -->
  <rect x="30.5" y="12" width="3" height="32" rx="1.5" fill="#0F172A" opacity="0.18"/>

  <!-- Book base arc -->
  <path d="M 11 50 Q 32 55 53 50" stroke="#ffffff" stroke-width="1.5"
        fill="none" stroke-opacity="0.12" stroke-linecap="round"/>

  <!-- Student nodes — amber=learner with points, blue=peer helper -->
  <circle cx="19" cy="58" r="5" fill="#F59E0B"/>
  <circle cx="45" cy="58" r="5" fill="#93B4FF"/>

  <!-- Knowledge lines rising from students into the book -->
  <line x1="19" y1="53" x2="31" y2="43.5" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="53" x2="33" y2="43.5" stroke="#93B4FF" stroke-width="2" stroke-linecap="round"/>
</svg>
